<!-- Editor Modal Template -->
<div id="editor-modal" class="modal hidden">
  <div class="modal-content">
    <div class="flex justify-between items-center mb-8">
      <h2 id="modal-title" class="text-2xl font-bold">Edit Item</h2>
      <button id="close-modal" class="text-2xl hover:scale-110">&times;</button>
    </div>
    <form id="editor-form" class="space-y-6">
      <input type="hidden" id="edit-id" name="id">
      <input type="text" id="edit-title" name="title" placeholder="Title" class="editor-field">
      <textarea id="edit-description" name="description" placeholder="Description" rows="4" class="editor-field"></textarea>
      <div>
        <label>Tech Stack (comma separated)</label>
        <input type="text" id="edit-tech" name="tech_stack" class="editor-field">
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <input type="number" id="edit-recency" name="recency" min="0" max="1" step="0.1" class="editor-field">
        <input type="number" id="edit-complexity" name="complexity" min="1" max="5" class="editor-field">
      </div>
      <div>
        <label>Image</label>
        <input type="file" id="edit-image" name="image" class="editor-field">
        <p id="image-preview" class="text-sm opacity-75 mt-1"></p>
      </div>
      <div class="flex gap-4">
        <button type="submit" class="flex-1 bg-blue-600 text-white py-3 px-6 rounded-xl font-bold hover:bg-blue-700 hover-scale">Save Changes</button>
        <button type="button" id="cancel-edit" class="flex-1 bg-slate-600 text-white py-3 px-6 rounded-xl font-bold hover:bg-slate-700 hover-scale">Cancel</button>
      </div>
    </form>
  </div>
</div>
