<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <script type="module" src="scripts/auth.js" defer></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-8 font-sans">
  <main class="glass max-w-md w-full p-12 rounded-3xl shadow-2xl">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-black bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text mb-2">Portfolio Admin</h1>
      <p class="opacity-75">Secure login required</p>
    </div>
    
    <form id="login-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" required class="w-full p-4 rounded-2xl bg-slate-700 border border-slate-600 focus:ring-4 focus:ring-blue-500 transition-all">
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" required class="w-full p-4 rounded-2xl bg-slate-700 border border-slate-600 focus:ring-4 focus:ring-blue-500 transition-all">
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 px-8 rounded-2xl font-bold text-lg hover-scale shadow-2xl">
        Sign In
      </button>
    </form>

    <p class="text-center mt-8 opacity-50 text-sm">
      Demo: admin@portfolio.dev / password
    </p>
  </main>

  <script>
    // Inline auth stub for immediate test
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      if (email === 'admin@portfolio.dev' && pass === 'password') {
        localStorage.setItem('adminToken', 'demo-jwt');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials');
      }
    });
  </script>
</body>
</html>
